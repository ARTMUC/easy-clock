services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${GONE_DB_DATABASE}
      MYSQL_USER: ${GONE_DB_USERNAME}
      MYSQL_PASSWORD: ${GONE_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${GONE_DB_PASSWORD}
    ports:
      - "127.0.0.1:${GONE_DB_PORT:-3306}:3306"
    volumes:
      - mysql_volume:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${GONE_DB_USERNAME}", "-p${GONE_DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: "8080"
      GONE_DB_HOST: mysql
      GONE_DB_PORT: "3306"
      GONE_DB_DATABASE: ${GONE_DB_DATABASE}
      GONE_DB_USERNAME: ${GONE_DB_USERNAME}
      GONE_DB_PASSWORD: ${GONE_DB_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL:-noreply@example.com}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME:-KidClock}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads_volume:/app/static/uploads

volumes:
  mysql_volume:
  uploads_volume:
